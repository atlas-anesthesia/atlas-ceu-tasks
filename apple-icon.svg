<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#243752"/>
      <stop offset="1" stop-color="#1a2435"/>
    </linearGradient>
    <linearGradient id="needle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5aa9f0"/>
      <stop offset="1" stop-color="#1e88e5"/>
    </linearGradient>
  </defs>
  <!-- full-bleed opaque square (no rounded corners — iOS rounds it itself) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="10"/>
  <polygon points="256,92 288,256 256,420 224,256" fill="#ffffff"/>
  <polygon points="92,256 256,224 420,256 256,288" fill="url(#needle)"/>
  <circle cx="256" cy="256" r="24" fill="#1a2435" stroke="#ffffff" stroke-width="7"/>
</svg>
